<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bottom half of pen (open) -->
  <rect x="24" y="44" width="32" height="28" rx="16" ry="14" />
  <ellipse cx="40" cy="46" rx="12" ry="3" opacity="0.3" />
  <!-- Aromatic core being inserted — small capsule -->
  <rect x="34" y="16" width="12" height="24" rx="6" ry="6" />
  <!-- Aroma dots around core -->
  <circle cx="30" cy="24" r="1.5" opacity="0.3" />
  <circle cx="50" cy="20" r="1" opacity="0.25" />
  <circle cx="28" cy="32" r="1" opacity="0.2" />
  <circle cx="52" cy="30" r="1.5" opacity="0.3" />
  <!-- Arrow down showing insertion -->
  <line x1="40" y1="6" x2="40" y2="14" opacity="0.5" />
  <polyline points="37,11 40,14 43,11" opacity="0.5" />
</svg>
