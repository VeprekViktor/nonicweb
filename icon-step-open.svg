<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Top half of pen — separated, floating up -->
  <rect x="24" y="8" width="32" height="22" rx="16" ry="10" />
  <ellipse cx="40" cy="28" rx="12" ry="3" opacity="0.3" />
  <!-- Bottom half of pen — stays in place -->
  <rect x="24" y="42" width="32" height="28" rx="16" ry="14" />
  <ellipse cx="40" cy="44" rx="12" ry="3" opacity="0.3" />
  <!-- Separation gap arrows -->
  <path d="M40 33 L40 38" stroke-dasharray="1.5 2" opacity="0.5" />
  <polyline points="36,35 40,32 44,35" opacity="0.4" />
  <polyline points="36,39 40,42 44,39" opacity="0.4" />
</svg>
